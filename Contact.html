<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Livora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d0d0d; } /* Dark theme for contact */
        .font-serif { font-family: 'Playfair Display', serif; }
        .gold-text { color: #c59d5f; }
        .gold-bg { background-color: #c59d5f; }
        
        /* Custom Input Styling */
        .form-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 12px 0;
            width: 100%;
            transition: all 0.3s ease;
        }
        .form-input:focus {
            outline: none;
            border-bottom-color: #c59d5f;
        }
        .form-input::placeholder { color: rgba(255,255,255,0.3); font-weight: 300; }
    </style>
</head>

<body class="text-white">

    <nav class="w-full py-6 px-6 lg:px-12 border-b border-white/10 flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-3 group">
            <div class="w-10 h-10 flex items-center justify-center border border-[#c59d5f] rounded-full text-[#c59d5f] font-serif text-lg transition duration-300 group-hover:scale-105">L</div>
            <span class="font-serif tracking-[0.2em] uppercase text-sm">Return Home</span>
        </a>
    </nav>

    <section class="py-20 lg:py-32">
        <div class="max-w-7xl mx-auto px-6 lg:px-12">
            <div class="grid lg:grid-cols-2 gap-20">
                
                <div>
                    <span class="gold-text uppercase text-xs font-bold tracking-[0.3em] mb-4 block">Get In Touch</span>
                    <h1 class="text-5xl md:text-6xl font-serif font-normal tracking-wide mb-8">Let's Discuss<br>Your Project</h1>
                    <p class="text-gray-400 font-light mb-12 max-w-md">We would love to hear about your upcoming project. Reach out to our studio to schedule an initial consultation.</p>
                    
                    <div class="space-y-8">
                        <div>
                            <h4 class="text-xs uppercase tracking-[0.2em] text-gray-500 mb-2">Studio Location</h4>
                            <p class="font-light text-lg">120 Madison Avenue, Suite 400<br>New York, NY 10016</p>
                        </div>
                        <div>
                            <h4 class="text-xs uppercase tracking-[0.2em] text-gray-500 mb-2">Contact</h4>
                            <p class="font-light text-lg hover:text-[#c59d5f] transition cursor-pointer">hello@livorastudio.com</p>
                            <p class="font-light text-lg">+1 (212) 555-0198</p>
                        </div>
                    </div>
                </div>

                <div class="bg-[#141414] p-10 rounded-2xl border border-white/5 shadow-2xl">
                    <form class="space-y-8">
                        <div class="grid grid-cols-2 gap-8">
                            <div>
                                <label class="text-[10px] uppercase tracking-[0.2em] text-gray-400 mb-1 block">First Name</label>
                                <input type="text" class="form-input" placeholder="Jane">
                            </div>
                            <div>
                                <label class="text-[10px] uppercase tracking-[0.2em] text-gray-400 mb-1 block">Last Name</label>
                                <input type="text" class="form-input" placeholder="Doe">
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] uppercase tracking-[0.2em] text-gray-400 mb-1 block">Email Address</label>
                            <input type="email" class="form-input" placeholder="jane@example.com">
                        </div>
                        <div>
                            <label class="text-[10px] uppercase tracking-[0.2em] text-gray-400 mb-1 block">Project Details</label>
                            <textarea class="form-input resize-none h-24" placeholder="Tell us about your space..."></textarea>
                        </div>
                        
                        <button type="button" class="gold-bg text-white w-full py-4 text-xs font-bold tracking-[0.2em] uppercase rounded hover:bg-[#a37a44] transition-all duration-300 transform hover:-translate-y-1 active:scale-95 active:translate-y-0 mt-4">
                            Send Message
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </section>

</body>
</html>
