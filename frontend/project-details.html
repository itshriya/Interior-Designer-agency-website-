<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>
    Project Details | Livora
</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">

<style>

    body{
        font-family:'Plus Jakarta Sans',sans-serif;
        background:#0d0d0d;
        color:white;
    }

    .font-serif{
        font-family:'Playfair Display',serif;
    }

    .gold-text{
        color:#c59d5f;
    }

</style>
</head>

<body>

<nav
    class="w-full py-6 px-6 lg:px-12 border-b border-white/10 flex justify-between items-center">


<a
    href="./project.html"
    class="text-[#c59d5f] uppercase tracking-widest text-sm">

    ← Back To Projects

</a>


</nav>

<div
    id="loading"
    class="text-center py-32 text-gray-400">


Loading Project...


</div>

<section
    id="projectSection"
    class="hidden">


<div
    id="gallery"
    class="grid md:grid-cols-2 gap-6 max-w-7xl mx-auto px-6 py-16">

</div>

<div
    class="max-w-5xl mx-auto px-6 pb-24">

    <span
        id="projectCategory"
        class="gold-text uppercase tracking-[0.3em] text-xs font-semibold">

    </span>

    <h1
        id="projectTitle"
        class="font-serif text-5xl md:text-7xl mt-6 mb-8">

    </h1>

    <div
        class="mb-8 text-gray-400">

        📍
        <span id="projectLocation"></span>

    </div>

    <p
        id="projectDescription"
        class="text-gray-300 leading-relaxed text-lg">

    </p>

</div>


</section>

<script>

const API_URL =
"http://127.0.0.1:8000";

const params =
new URLSearchParams(
    window.location.search
);

const projectId =
params.get("id");

async function loadProject(){

    try{

        const response =
        await fetch(
            `${API_URL}/project/${projectId}`
        );

        const project =
        await response.json();

        document
        .getElementById(
            "projectTitle"
        )
        .innerText =
        project.title;

        document
        .getElementById(
            "projectCategory"
        )
        .innerText =
        project.category;

        document
        .getElementById(
            "projectLocation"
        )
        .innerText =
        project.location;

        document
        .getElementById(
            "projectDescription"
        )
        .innerText =
        project.description;

        const gallery =
        document.getElementById(
            "gallery"
        );

        gallery.innerHTML = "";

        project.images.forEach(image => {

            gallery.innerHTML += `

            <img
                src="${image}"
                class="w-full h-[450px] object-cover rounded-2xl">

            `;

        });

        document
        .getElementById(
            "loading"
        )
        .style.display =
        "none";

        document
        .getElementById(
            "projectSection"
        )
        .classList.remove(
            "hidden"
        );

    }

    catch(error){

        console.error(error);

        document
        .getElementById(
            "loading"
        )
        .innerText =
        "Failed To Load Project";

    }

}

loadProject();

</script>

</body>

</html>
