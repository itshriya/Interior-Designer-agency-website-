<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>
    Livora Blogs
</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">

<style>

    body{
        font-family:'Plus Jakarta Sans',sans-serif;
        background:#0d0d0d;
        color:white;
    }

    .font-serif{
        font-family:'Playfair Display',serif;
    }

    .gold-text{
        color:#c59d5f;
    }

    .blog-card{
        background:#141414;
        border:1px solid rgba(255,255,255,0.05);
        border-radius:20px;
        overflow:hidden;
        transition:.4s ease;
    }

    .blog-card:hover{
        transform:translateY(-8px);
    }

</style>
</head>

<body>

<nav
    class="w-full py-6 px-6 lg:px-12 border-b border-white/10">


<a
    href="index.html"
    class="gold-text uppercase tracking-widest text-sm">

    ← Return Home

</a>


</nav>

<section
    class="py-24 text-center">

<div
    class="max-w-4xl mx-auto px-6">

    <span
        class="gold-text uppercase tracking-[0.3em] text-xs">

        Insights & Inspiration

    </span>

    <h1
        class="font-serif text-5xl md:text-7xl mt-6 mb-8">

        Interior Design Blog

    </h1>

    <p
        class="text-gray-400 max-w-2xl mx-auto">

        Discover luxury interior ideas,
        design trends and expert advice
        from Livora.

    </p>

</div>


</section>

<section
    class="pb-24">

<div
    class="max-w-7xl mx-auto px-6 lg:px-12">

    <div
        id="blogsContainer"
        class="grid md:grid-cols-2 lg:grid-cols-3 gap-10">

    </div>

</div>


</section>

<div
    id="loading"
    class="text-center text-gray-400 pb-20">

Loading Blogs...


</div>

<script>

const API_URL =
"http://127.0.0.1:8000";

async function loadBlogs(){

    try{

        const response =
        await fetch(
            `${API_URL}/blogs`
        );

        const blogs =
        await response.json();

        const container =
        document.getElementById(
            "blogsContainer"
        );

        const loading =
        document.getElementById(
            "loading"
        );

        container.innerHTML = "";

        const publishedBlogs =
        blogs.filter(
            blog =>
            blog.status === "published"
        );

        if(
            publishedBlogs.length === 0
        ){

            loading.innerText =
            "No Blogs Available";

            return;

        }

        publishedBlogs.forEach(blog => {

            container.innerHTML += `

            <div class="blog-card">

                <img
                    src="${blog.image_url}"
                    class="w-full h-64 object-cover">

                <div class="p-6">

                    <span
                        class="gold-text uppercase text-xs tracking-widest">

                        ${blog.category}

                    </span>

                    <h2
                        class="font-serif text-3xl mt-3 mb-3">

                        ${blog.title}

                    </h2>

                    <p
                        class="text-gray-400 text-sm mb-6">

                        By ${blog.author}

                    </p>

                    <a
                        href="blog-details.html?id=${blog._id}"
                        class="gold-text hover:underline">

                        Read More →

                    </a>

                </div>

            </div>

            `;

        });

        loading.style.display =
        "none";

    }

    catch(error){

        console.error(error);

        document.getElementById(
            "loading"
        ).innerText =
        "Failed To Load Blogs";

    }

}

loadBlogs();

</script>

</body>

</html>
