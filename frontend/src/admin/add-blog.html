<!DOCTYPE html>



<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Livora Admin - Add Blog</title>





<script src="https://cdn.tailwindcss.com"></script>



<script>

    tailwind.config = {

        theme: {

            extend: {

                colors: {

                    gold: '#C59D5F',

                    dark: '#0D0D0D',

                    light: '#F8F6F2'

                }

            }

        }

    }

</script>
</head>



<body class="bg-light font-sans text-dark flex h-screen overflow-hidden">

<aside class="w-64 bg-dark text-white flex flex-col">

    <div class="p-6 text-center text-2xl font-bold text-gold border-b border-gray-800">

        LIVORA

    </div>



    <nav class="flex-1 p-4 space-y-2">

        <a href="dashboard.html" class="block px-4 py-2 rounded hover:bg-gray-800">Dashboard</a>

        <a href="designs.html" class="block px-4 py-2 rounded hover:bg-gray-800">Designs</a>

        <a href="orders.html" class="block px-4 py-2 rounded hover:bg-gray-800">Orders</a>

        <a href="users.html" class="block px-4 py-2 rounded hover:bg-gray-800">Users</a>

        <a href="blogs.html" class="block px-4 py-2 rounded bg-gold text-dark font-semibold">Blogs</a>

        <a href="settings.html" class="block px-4 py-2 rounded hover:bg-gray-800">Settings</a>

    </nav>



    <div class="p-4 border-t border-gray-800">

        <button

            id="logoutBtn"

            class="w-full text-left px-4 py-2 text-red-400 hover:text-red-300">

            Logout

        </button>

    </div>

</aside>



<main class="flex-1 overflow-y-auto">



    <header class="bg-white shadow-sm border-b px-8 py-5">

        <h1 class="text-2xl font-bold">

            Add New Blog

        </h1>

    </header>



    <div class="p-8">



        <form

            id="blogForm"

            class="bg-white rounded-xl shadow-sm border p-8 space-y-6">



            <div>

                <label class="block mb-2 font-medium">

                    Blog Title

                </label>



                <input

                    type="text"

                    id="title"

                    required

                    class="w-full border rounded-lg p-3 focus:outline-none focus:border-gold">

            </div>



            <div>

                <label class="block mb-2 font-medium">

                    Category

                </label>



                <select

                    id="category"

                    class="w-full border rounded-lg p-3">



                    <option value="Living Room">

                        Living Room

                    </option>



                    <option value="Bedroom">

                        Bedroom

                    </option>



                    <option value="Kitchen">

                        Kitchen

                    </option>



                    <option value="Bathroom">

                        Bathroom

                    </option>



                    <option value="Office">

                        Office

                    </option>



                    <option value="Interior Tips">

                        Interior Tips

                    </option>



                </select>

            </div>



            <div>

                <label class="block mb-2 font-medium">

                    Featured Image

                </label>



                <input

                    type="file"

                    id="image"

                    accept="image/*"

                    required

                    class="w-full">



                <img

                    id="preview"

                    class="mt-4 hidden rounded-lg w-64 border">

            </div>



            <div>

                <label class="block mb-2 font-medium">

                    Blog Content

                </label>



                <textarea

                    id="content"

                    rows="12"

                    required

                    class="w-full border rounded-lg p-3 resize-none"></textarea>

            </div>



            <div>

                <label class="block mb-2 font-medium">

                    Status

                </label>



                <select

                    id="status"

                    class="w-full border rounded-lg p-3">



                    <option value="draft">

                        Draft

                    </option>



                    <option value="published">

                        Published

                    </option>



                </select>

            </div>



            <div class="flex gap-4">



                <button

                    type="submit"

                    class="bg-dark text-white px-6 py-3 rounded-lg hover:bg-gold transition">



                    Save Blog



                </button>



                <a

                    href="blogs.html"

                    class="border px-6 py-3 rounded-lg">



                    Cancel



                </a>



            </div>



        </form>



    </div>



</main>





<script>



if(!localStorage.getItem("token")){



    window.location.href =

    "../auth/login.html";



}



document

.getElementById("logoutBtn")

.addEventListener(

    "click",

    () => {



        localStorage.removeItem("token");

        localStorage.removeItem("role");



        window.location.href =

        "../auth/login.html";



    }

);



const imageInput =

document.getElementById(

    "image"

);



const preview =

document.getElementById(

    "preview"

);



let imageUrl = "";



imageInput.addEventListener(

    "change",

    () => {



        const file =

        imageInput.files[0];



        if(file){



            preview.src =

            URL.createObjectURL(

                file

            );



            preview.classList.remove(

                "hidden"

            );



        }



    }

);



document

.getElementById("blogForm")

.addEventListener(

    "submit",

    async (e) => {



        e.preventDefault();



        try{



            const imageFile =

            imageInput.files[0];



            const formData =

            new FormData();



            formData.append(

                "file",

                imageFile

            );



            const uploadResponse =

            await fetch(

                "http://127.0.0.1:8000/upload",

                {

                    method:"POST",

                    body:formData

                }

            );



            const uploadData =

            await uploadResponse.json();



            imageUrl =

            uploadData.image_url;



            const blogData = {



                title:

                document.getElementById(

                    "title"

                ).value,



                category:

                document.getElementById(

                    "category"

                ).value,



                content:

                document.getElementById(

                    "content"

                ).value,



                image_url:

                imageUrl,



                author:

                "Admin",



                status:

                document.getElementById(

                    "status"

                ).value



            };



            const response =

            await fetch(

                "http://127.0.0.1:8000/blog",

                {

                    method:"POST",

                    headers:{

                        "Content-Type":

                        "application/json"

                    },

                    body:JSON.stringify(

                        blogData

                    )

                }

            );



            if(response.ok){



                alert(

                    "Blog Created Successfully"

                );



                window.location.href =

                "blogs.html";



            }



        }



        catch(error){



            console.error(

                error

            );



            alert(

                "Failed to create blog"

            );



        }



    }

);



</script>



</body>

</html>
