<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livora Admin - Manage Designs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#C59D5F',
                        dark: '#0D0D0D',
                        light: '#F8F6F2'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-light font-sans text-dark flex h-screen overflow-hidden">

    <aside class="w-64 bg-dark text-white flex flex-col h-full">
        <div class="p-6 text-center text-2xl font-bold tracking-widest text-gold border-b border-gray-800">
            LIVORA
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="dashboard.html" class="block px-4 py-2 rounded hover:bg-gray-800 transition">Dashboard</a>
            <a href="designs.html" class="block px-4 py-2 rounded bg-gold text-dark font-semibold">Designs</a>
           <a href="orders.html" class="block px-4 py-2 rounded hover:bg-gray-800 transition">Orders</a>
            <a href="users.html" class="block px-4 py-2 rounded hover:bg-gray-800 transition">Users</a>
            <a href="blogs.html" class="block px-4 py-2 rounded hover:bg-gray-800 transition">Blogs</a>
            <a href="settings.html" class="block px-4 py-2 rounded hover:bg-gray-800 transition">Settings</a>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <button id="logoutBtn" class="w-full text-left px-4 py-2 text-red-400 hover:text-red-300 transition">Logout</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden">
        
        <header class="bg-white shadow-sm h-16 flex items-center justify-between px-8 border-b border-gray-200">
            <h1 class="text-xl font-bold">Manage Designs</h1>
            <div class="flex items-center gap-4">
                <span class="text-sm font-medium">Welcome, Admin</span>
                <div class="w-8 h-8 rounded-full bg-gold text-dark flex items-center justify-center font-bold">A</div>
            </div>
        </header>

        <div class="p-8 overflow-y-auto flex-1">
            
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                
                <div class="flex items-center gap-4 w-full md:w-auto">
                    <input type="text" id="searchDesign" placeholder="Search designs..." class="w-full md:w-64 p-2 border border-gray-300 rounded focus:outline-none focus:border-gold focus:ring-1 focus:ring-gold text-sm">
                    <select id="categoryFilter" class="p-2 border border-gray-300 rounded focus:outline-none focus:border-gold focus:ring-1 focus:ring-gold text-sm bg-white">
                        <option value="all">All Categories</option>
                        <option value="living_room">Living Room</option>
                        <option value="bedroom">Bedroom</option>
                        <option value="kitchen">Kitchen</option>
                        <option value="bathroom">Bathroom</option>
                    </select>
                </div>

                <a href="add-design.html" class="w-full md:w-auto px-6 py-2 bg-dark text-white rounded hover:bg-gold transition flex items-center justify-center gap-2 text-sm font-medium">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                    Add New Design
                </a>
            </div>

            <div class="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-600 text-sm">
                                <th class="px-6 py-4 border-b w-24">Image</th>
                                <th class="px-6 py-4 border-b">Design Title</th>
                                <th class="px-6 py-4 border-b">Category</th>
                                <th class="px-6 py-4 border-b">Location</th>
                                <th class="px-6 py-4 border-b text-right">Actions</th>
                            </tr>
                        </thead>
                     <tbody id="designsTableBody">

</tbody>
                    </table>
                </div>
                
                <div class="px-6 py-4 border-t border-gray-100 flex items-center justify-between text-sm text-gray-600">
                    <div>Showing 1 to 10 of 45 designs</div>
                    <div class="flex gap-2">
                        <button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50 disabled:opacity-50">Previous</button>
                        <button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50 bg-gray-50">1</button>
                        <button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50">2</button>
                        <button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50">Next</button>
                    </div>
                </div>
            </div>

        </div>
    </main>
    
    <script src="./js/designs.js"></script>
</body>
</html>
