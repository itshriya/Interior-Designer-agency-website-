<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livora Admin - Manage Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#C59D5F',
                        dark: '#0D0D0D',
                        light: '#F8F6F2'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-light font-sans text-dark flex h-screen overflow-hidden">

    <aside class="w-64 bg-dark text-white flex flex-col h-full">
        <div class="p-6 text-center text-2xl font-bold tracking-widest text-gold border-b border-gray-800">
            LIVORA
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="dashboard.html" class="block px-4 py-2 rounded hover:bg-gray-800 transition">Dashboard</a>
            <a href="designs.html" class="block px-4 py-2 rounded hover:bg-gray-800 transition">Designs</a>
            <a href="orders.html" class="block px-4 py-2 rounded bg-gold text-dark font-semibold">Orders</a>
            <a href="users.html" class="block px-4 py-2 rounded hover:bg-gray-800 transition">Users</a>
            <a href="blogs.html" class="block px-4 py-2 rounded hover:bg-gray-800 transition">Blogs</a>
            <a href="settings.html" class="block px-4 py-2 rounded hover:bg-gray-800 transition">Settings</a>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <button id="logoutBtn" class="w-full text-left px-4 py-2 text-red-400 hover:text-red-300 transition">Logout</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden">
        
        <header class="bg-white shadow-sm h-16 flex items-center justify-between px-8 border-b border-gray-200">
            <h1 class="text-xl font-bold">Manage Orders</h1>
            <div class="flex items-center gap-4">
                <span class="text-sm font-medium">Welcome, Admin</span>
                <div class="w-8 h-8 rounded-full bg-gold text-dark flex items-center justify-center font-bold">A</div>
            </div>
        </header>

        <div class="p-8 overflow-y-auto flex-1">
            
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                
                <div class="flex items-center gap-4 w-full md:w-auto">
                    <input type="text" id="searchOrder" placeholder="Search by Order ID or User Email..." class="w-full md:w-72 p-2 border border-gray-300 rounded focus:outline-none focus:border-gold focus:ring-1 focus:ring-gold text-sm">
                    <select id="statusFilter" class="p-2 border border-gray-300 rounded focus:outline-none focus:border-gold focus:ring-1 focus:ring-gold text-sm bg-white">
                        <option value="all">All Statuses</option>
                        <option value="pending">Pending</option>
                        <option value="approved">Approved</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-600 text-sm">
                                <th>Lead ID</th>
                                <th>Client</th>
                                <th>Project Type</th>
                                <th>Preferred Date</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTableBody">
                        </tbody>
                    </table>
                </div>
                
                <div class="px-6 py-4 border-t border-gray-100 flex items-center justify-between text-sm text-gray-600">
                    <div>Showing 1 to 10 of 124 orders</div>
                    <div class="flex gap-2">
                        <button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50 disabled:opacity-50">Previous</button>
                        <button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50 bg-gray-50">1</button>
                        <button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50">2</button>
                        <button class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50">Next</button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div id="orderModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-lg p-6 m-4">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="text-xl font-bold" id="modalOrderTitle">Manage Order</h2>
                <button id="closeModalBtn" class="text-gray-500 hover:text-gray-800 text-2xl">&times;</button>
            </div>
            
            <div class="mb-6 space-y-3">
                <div class="flex justify-between text-sm">
                    <span class="text-gray-600">Customer:</span>
                    <span class="font-medium text-dark" id="modalCustomer">Loading...</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-gray-600">Design:</span>
                    <span class="font-medium text-dark" id="modalDesign">Loading...</span>
                </div>
                <div class="flex justify-between text-sm border-t pt-2 mt-2">
                    <span class="text-gray-600">Total Price:</span>
                    <span class="font-bold text-gold" id="modalPrice">Loading...</span>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Update Order Status</label>
                <select id="updateStatusSelect" class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:border-gold focus:ring-1 focus:ring-gold">
                    <option value="pending">Pending</option>
                    <option value="approved">Approve Order</option>
                    <option value="completed">Mark as Completed</option>
                    <option value="cancelled">Cancel Order</option>
                </select>
            </div>

            <div class="flex justify-end gap-3">
                <button id="cancelModalBtn" class="px-4 py-2 border border-gray-300 rounded text-gray-700 hover:bg-gray-50 transition">Close</button>
                <button id="saveStatusBtn" class="px-4 py-2 bg-dark text-white rounded hover:bg-gold transition">Save Changes</button>
            </div>
        </div>
    </div>

  <script>
if(!localStorage.getItem("token")){

    window.location.href =
    "../auth/login.html";

}

document
.getElementById("logoutBtn")
.addEventListener(
    "click",
    () => {

        localStorage.removeItem(
            "token"
        );

        localStorage.removeItem(
            "role"
        );

        window.location.href =
        "../auth/login.html";

    }
);

const API_URL = "http://127.0.0.1:8000";

async function loadConsultations(){

    try{

        const response =
        await fetch(
            `${API_URL}/consultations`
        );

        const consultations =
        await response.json();

        const table =
        document.getElementById(
            "ordersTableBody"
        );

        table.innerHTML = "";

        consultations.forEach(item => {

            table.innerHTML += `
            <tr class="hover:bg-gray-50 border-b">

                <td class="px-6 py-4 text-sm">
                    ${item._id.slice(-6)}
                </td>

                <td class="px-6 py-4">
                    <p class="font-medium">
                        ${item.name}
                    </p>

                    <p class="text-xs text-gray-500">
                        ${item.email}
                    </p>

                    <p class="text-xs text-gray-500">
                        ${item.phone}
                    </p>
                </td>

                <td class="px-6 py-4">
                    ${item.project_type}
                </td>

                <td class="px-6 py-4">
                    ${item.preferred_date}
                </td>

                <td class="px-6 py-4">
                    <span class="px-3 py-1 rounded-full bg-yellow-100 text-yellow-800 text-xs">
                        New Lead
                    </span>
                </td>

                <td class="px-6 py-4 text-right">
                    <button
                        onclick="showDetails(
                            '${item.name}',
                            '${item.email}',
                            '${item.phone}',
                            '${item.budget}',
                            '${item.message}'
                        )"
                        class="text-blue-600 hover:text-blue-800">
                        View
                    </button>
                </td>

            </tr>
            `;
        });

    }

    catch(error){

        console.error(error);

    }

}

function showDetails(
    name,
    email,
    phone,
    budget,
    message
){

    alert(
`Name: ${name}

Email: ${email}

Phone: ${phone}

Budget: ${budget}

Message:
${message}`
    );

}

loadConsultations();
</script>
</body>
</html>
