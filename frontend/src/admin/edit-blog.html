<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Blog | Livora</title>


<script src="https://cdn.tailwindcss.com"></script>

<script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    gold:"#C59D5F",
                    dark:"#0D0D0D",
                    light:"#F8F6F2"
                }
            }
        }
    }
</script>


</head>

<body class="bg-light">

<div class="max-w-5xl mx-auto p-8">


<div class="flex justify-between items-center mb-8">

    <h1 class="text-3xl font-bold">
        Edit Blog
    </h1>

    <a
        href="blogs.html"
        class="px-5 py-2 border rounded">

        Back

    </a>

</div>

<form
    id="editBlogForm"
    class="bg-white rounded-xl shadow border p-8 space-y-6">

    <div>

        <label class="block mb-2 font-medium">
            Title
        </label>

        <input
            type="text"
            id="title"
            class="w-full border rounded-lg p-3">

    </div>

    <div>

        <label class="block mb-2 font-medium">
            Category
        </label>

        <input
            type="text"
            id="category"
            class="w-full border rounded-lg p-3">

    </div>

    <div>

        <label class="block mb-2 font-medium">
            Current Image
        </label>

        <img
            id="preview"
            class="w-64 rounded border mb-4">

        <input
            type="file"
            id="image">

    </div>

    <div>

        <label class="block mb-2 font-medium">
            Content
        </label>

        <textarea
            id="content"
            rows="12"
            class="w-full border rounded-lg p-3"></textarea>

    </div>

    <div>

        <label class="block mb-2 font-medium">
            Status
        </label>

        <select
            id="status"
            class="w-full border rounded-lg p-3">

            <option value="draft">
                Draft
            </option>

            <option value="published">
                Published
            </option>

        </select>

    </div>

    <button
        type="submit"
        class="bg-dark text-white px-6 py-3 rounded-lg hover:bg-gold">

        Update Blog

    </button>

</form>


</div>

<script>

const API_URL =
"http://127.0.0.1:8000";

const params =
new URLSearchParams(
    window.location.search
);

const blogId =
params.get("id");

let currentImage = "";

async function loadBlog(){

    const response =
    await fetch(
        `${API_URL}/blog/${blogId}`
    );

    const blog =
    await response.json();

    document
    .getElementById("title")
    .value =
    blog.title;

    document
    .getElementById("category")
    .value =
    blog.category;

    document
    .getElementById("content")
    .value =
    blog.content;

    document
    .getElementById("status")
    .value =
    blog.status;

    document
    .getElementById("preview")
    .src =
    blog.image_url;

    currentImage =
    blog.image_url;

}

loadBlog();

document
.getElementById(
    "editBlogForm"
)
.addEventListener(
    "submit",
    async (e)=>{

        e.preventDefault();

        let imageUrl =
        currentImage;

        const imageFile =
        document
        .getElementById(
            "image"
        )
        .files[0];

        if(imageFile){

            const formData =
            new FormData();

            formData.append(
                "file",
                imageFile
            );

            const uploadResponse =
            await fetch(
                `${API_URL}/upload`,
                {
                    method:"POST",
                    body:formData
                }
            );

            const uploadData =
            await uploadResponse.json();

            imageUrl =
            uploadData.image_url;

        }

        const updatedBlog = {

            title:
            document
            .getElementById(
                "title"
            )
            .value,

            category:
            document
            .getElementById(
                "category"
            )
            .value,

            content:
            document
            .getElementById(
                "content"
            )
            .value,

            image_url:
            imageUrl,

            author:
            "Admin",

            status:
            document
            .getElementById(
                "status"
            )
            .value
        };

        const response =
        await fetch(
            `${API_URL}/blog/${blogId}`,
            {
                method:"PUT",
                headers:{
                    "Content-Type":
                    "application/json"
                },
                body:JSON.stringify(
                    updatedBlog
                )
            }
        );

        if(response.ok){

            alert(
                "Blog Updated Successfully"
            );

            window.location.href =
            "blogs.html";

        }

    }
);

</script>

</body>
</html>
