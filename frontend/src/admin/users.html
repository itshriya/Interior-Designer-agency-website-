<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livora Admin - Manage Users</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{colors:{gold:'#C59D5F',dark:'#0D0D0D',light:'#F8F6F2'}}}}
</script>
</head>
<body class="bg-light font-sans text-dark flex h-screen overflow-hidden">

<aside class="w-64 bg-dark text-white flex flex-col">
<div class="p-6 text-center text-2xl font-bold tracking-widest text-gold border-b border-gray-800">LIVORA</div>

<nav class="flex-1 px-4 py-6 space-y-2">
<a href="dashboard.html" class="block px-4 py-2 rounded hover:bg-gray-800">Dashboard</a>
<a href="designs.html" class="block px-4 py-2 rounded hover:bg-gray-800">Designs</a>
<a href="orders.html" class="block px-4 py-2 rounded hover:bg-gray-800">Orders</a>
<a href="users.html" class="block px-4 py-2 rounded bg-gold text-dark font-semibold">Users</a>
<a href="blogs.html" class="block px-4 py-2 rounded hover:bg-gray-800">Blogs</a>
<a href="settings.html" class="block px-4 py-2 rounded hover:bg-gray-800">Settings</a>
</nav>

<div class="p-4 border-t border-gray-800">
<button id="logoutBtn" class="w-full text-left text-red-400">Logout</button>
</div>
</aside>

<main class="flex-1 p-8 overflow-auto">
<div class="flex justify-between items-center mb-6">
<h1 class="text-2xl font-bold">Manage Users</h1>
<div class="flex gap-3">
<input id="searchUser" placeholder="Search..." class="border rounded p-2">
<select id="roleFilter" class="border rounded p-2">
<option value="all">All Roles</option>
<option value="admin">Admin</option>
<option value="user">User</option>
</select>
</div>
</div>

<div class="bg-white rounded shadow overflow-hidden">
<table class="w-full">
<thead class="bg-gray-100">
<tr>
<th class="p-4 text-left">Name</th>
<th class="p-4 text-left">Email</th>
<th class="p-4 text-left">Role</th>
<th class="p-4 text-left">Joined</th>
<th class="p-4 text-right">Actions</th>
</tr>
</thead>
<tbody id="usersTableBody"></tbody>
</table>
</div>
</main>

<div id="userModal" class="hidden fixed inset-0 bg-black/50 items-center justify-center">
<div class="bg-white rounded p-6 w-full max-w-lg">
<div class="flex justify-between">
<h2 class="font-bold text-xl">User Details</h2>
<button id="closeModalBtn">&times;</button>
</div>
<div class="mt-4">
<p><b>Name:</b> <span id="modalUserName"></span></p>
<p><b>Email:</b> <span id="modalUserEmail"></span></p>
<p><b>Role:</b> <span id="modalUserRole"></span></p>
<p><b>ID:</b> <span id="modalUserId"></span></p>
</div>
<div class="mt-6 text-right">
<button id="cancelModalBtn" class="bg-dark text-white px-5 py-2 rounded">Close</button>
</div>
</div>
</div>

<div id="deleteModal" class="hidden fixed inset-0 bg-black/50 items-center justify-center">
<div class="bg-white rounded p-6 w-full max-w-md">
<h2 class="font-bold text-xl mb-3">Delete User</h2>
<p>Delete <b id="deleteUserName"></b>?</p>
<div class="flex justify-end gap-3 mt-6">
<button id="cancelDeleteBtn" class="border px-4 py-2 rounded">Cancel</button>
<button id="confirmDeleteBtn" class="bg-red-600 text-white px-4 py-2 rounded">Delete</button>
</div>
</div>
</div>

<script src="./js/users.js"></script>
</body>
</html>
