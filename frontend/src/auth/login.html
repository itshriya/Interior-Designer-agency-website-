<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Livora</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Plus Jakarta Sans',sans-serif;
        }

        .font-serif{
            font-family:'Playfair Display',serif;
        }

        .gold-bg{
            background:#c59d5f;
        }

        .gold-bg:hover{
            background:#af854d;
        }
    </style>
</head>
<body class="bg-[#f8f6f2]">
<a
    href="../../index.html"
    class="fixed top-6 left-6 z-50 flex items-center gap-2 bg-white border border-gray-200 px-5 py-3 rounded-xl text-sm font-semibold text-[#0d0d0d] shadow-md hover:border-[#c59d5f] hover:text-[#c59d5f] transition duration-300">
    ← Home
</a>
<div class="min-h-screen grid lg:grid-cols-2">

    <div class="hidden lg:flex bg-[#0d0d0d] text-white p-16 flex-col justify-center">

        <span class="text-[#c59d5f] uppercase tracking-[0.4em] text-xs font-semibold">
            Premium Interior Design
        </span>

        <h1 class="font-serif text-6xl mt-6 leading-tight">
            Welcome
            Back
        </h1>

        <p class="text-gray-400 mt-8 text-lg leading-relaxed max-w-md">
            Access your Livora account to manage projects,
            consultations and personalized design experiences.
        </p>

    </div>

    <div class="flex items-center justify-center p-8 lg:p-20">

        <div class="w-full max-w-md">

            <div class="text-center mb-10">

                <h2 class="font-serif text-4xl text-[#0d0d0d]">
                    Sign In
                </h2>

                <p class="text-gray-500 mt-3">
                    Continue to your account
                </p>

            </div>

            <form id="loginForm" class="space-y-5">

                <div>
                    <label class="text-sm font-medium text-gray-700 block mb-2">
                        Email Address
                    </label>

                    <input
                        type="email"
                        name="email"
                        id="email"
                        required
                        class="w-full border border-gray-300 rounded-xl px-4 py-4 outline-none focus:border-[#c59d5f]"
                        placeholder="john@example.com"
                    >
                </div>

                <div>
                    <label class="text-sm font-medium text-gray-700 block mb-2">
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        id="password"
                        required
                        class="w-full border border-gray-300 rounded-xl px-4 py-4 outline-none focus:border-[#c59d5f]"
                        placeholder="••••••••"
                    >
                </div>

                <div class="flex items-center justify-between">

                    <label class="flex items-center gap-2 text-sm text-gray-600">
                        <input type="checkbox">
                        Remember me
                    </label>

                    <a
                        href="#"
                        class="text-sm text-[#c59d5f] font-medium">
                        Forgot Password?
                    </a>

                </div>

                <div
                    id="errorMessage"
                    class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-sm">
                </div>

                <button
                    type="submit"
                    class="w-full gold-bg text-white py-4 rounded-xl font-semibold transition duration-300 shadow-lg">

                    Login

                </button>

            </form>

            <div class="mt-8 text-center">

                <span class="text-gray-500">
                    Don't have an account?
                </span>

                <a
                    href="signup.html"
                    class="text-[#c59d5f] font-semibold ml-1">

                    Create Account

                </a>

            </div>

        </div>

    </div>

</div>

<script>
const loginForm =
document.getElementById(
    "loginForm"
);

loginForm.addEventListener(
    "submit",
    async (e) => {

        e.preventDefault();

        const email =
        document.getElementById(
            "email"
        ).value;

        const password =
        document.getElementById(
            "password"
        ).value;

        try {

            const response =
            await fetch(
                "http://127.0.0.1:8000/login",
                {
                    method: "POST",
                    headers: {
                        "Content-Type":
                        "application/json"
                    },
                    body: JSON.stringify({
                        email,
                        password
                    })
                }
            );

            const data =
            await response.json();

            if(!response.ok){

                throw new Error(
                    data.detail
                );

            }

            localStorage.setItem(
                "token",
                data.access_token
            );

            localStorage.setItem(
                "role",
                data.role
            );

            if(
                data.role === "admin"
            ){

                window.location.href =
                "../admin/dashboard.html";

            }
            else{

                window.location.href =
                "../user/dashboard.html";

            }

        }

        catch(error){

            const errorBox =
            document.getElementById(
                "errorMessage"
            );

            errorBox.classList.remove(
                "hidden"
            );

            errorBox.innerText =
            error.message;

        }

    }
);
</script>

</body>
</html>
