<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Livora User Blogs
</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
rel="stylesheet">

<style>

body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background:#f8f6f2;
}

.font-serif{
    font-family:'Playfair Display',serif;
}

.gold{
    color:#c59d5f;
}

</style>

</head>

<body>

<div class="min-h-screen flex">

    <aside
    class="w-64 bg-[#0d0d0d] text-white">

        <div
        class="p-6 border-b border-white/10">

            <h2
            class="text-2xl font-bold">

                LIVORA

            </h2>

        </div>

        <nav class="p-4 space-y-2">

            <a
            href="dashboard.html"
            class="block px-4 py-2 rounded hover:bg-white/10">

                Dashboard

            </a>

            <a
            href="consultations.html"
            class="block px-4 py-2 rounded hover:bg-white/10">

                Consultations

            </a>

            <a
            href="blogs.html"
            class="block px-4 py-2 rounded bg-[#c59d5f] text-black">

                Blogs

            </a>

        </nav>

    </aside>

    <main class="flex-1 p-10">

        <h1
        class="font-serif text-5xl mb-2">

            Design Blogs

        </h1>

        <p
        class="text-gray-500 mb-10">

            Explore interior design insights and inspiration.

        </p>

        <div
        id="blogsContainer"
        class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">

        </div>

        <div
        id="loading"
        class="text-center py-10 text-gray-500">

            Loading Blogs...

        </div>

    </main>

</div>

<script>

const API_URL =
"http://127.0.0.1:8000";

async function loadBlogs(){

    try{

        const response =
        await fetch(
            `${API_URL}/blogs`
        );

        const blogs =
        await response.json();

        const publishedBlogs =
        blogs.filter(
            blog =>
            blog.status === "published"
        );

        const container =
        document.getElementById(
            "blogsContainer"
        );

        container.innerHTML = "";

        publishedBlogs.forEach(blog => {

            container.innerHTML += `

            <div
            class="bg-white rounded-2xl overflow-hidden shadow">

                <img
                src="${blog.image_url}"
                class="w-full h-60 object-cover">

                <div class="p-6">

                    <span
                    class="gold text-xs uppercase tracking-widest">

                        ${blog.category}

                    </span>

                    <h2
                    class="font-serif text-2xl mt-3 mb-3">

                        ${blog.title}

                    </h2>

                    <p
                    class="text-gray-500 mb-4">

                        By ${blog.author}

                    </p>

                    <a
                    href="../blog-details.html?id=${blog._id}"
                    class="text-[#c59d5f] font-semibold">

                        Read More →

                    </a>

                </div>

            </div>

            `;

        });

        document
        .getElementById(
            "loading"
        )
        .style.display =
        "none";

    }

    catch(error){

        console.error(error);

        document
        .getElementById(
            "loading"
        )
        .innerText =
        "Failed To Load Blogs";

    }

}

loadBlogs();

</script>

</body>

</html>
