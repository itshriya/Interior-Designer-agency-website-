<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livora User Blogs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#C59D5F',
                        dark: '#0D0D0D',
                        light: '#F8F6F2'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .font-serif {
            font-family: 'Playfair Display', serif;
        }
    </style>
</head>
<body class="bg-light">

<div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-dark text-white flex flex-col">
        <div class="p-6 border-b border-gray-800">
            <h1 class="text-2xl font-bold text-gold">LIVORA</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="dashboard.html" class="block px-4 py-3 rounded hover:bg-gray-800">Dashboard</a>
            <a href="consultations.html" class="block px-4 py-3 rounded hover:bg-gray-800">My Consultations</a>
            <a href="saved-designs.html" class="block px-4 py-3 rounded hover:bg-gray-800">Saved Designs</a>
            <a href="blogs.html" class="block px-4 py-3 rounded bg-gold text-dark font-semibold">Blogs</a>
            <a href="profile.html" class="block px-4 py-3 rounded hover:bg-gray-800">Profile</a>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <button id="logoutBtn" class="w-full text-left text-red-400 hover:text-red-300">Logout</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-10">
        <h1 class="font-serif text-5xl mb-2 text-dark">Design Blogs</h1>
        <p class="text-gray-500 mb-10">Explore interior design insights and inspiration.</p>

        <div id="blogsContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Blogs loaded dynamically -->
        </div>

        <div id="loading" class="text-center py-10 text-gray-500">Loading Blogs...</div>
    </main>
</div>

<script>
    // Auth guard
    if (!localStorage.getItem("token")) {
        window.location.href = "../auth/login.html";
    }

    // Logout
    document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("token");
        localStorage.removeItem("role");
        window.location.href = "../auth/login.html";
    });

    const API_URL = "http://127.0.0.1:8000";
    const token = localStorage.getItem("token");

    async function loadBlogs() {
        try {
            const response = await fetch(`${API_URL}/blogs`);
            const blogs = await response.json();

            const publishedBlogs = blogs.filter(blog => blog.status === "published");
            const container = document.getElementById("blogsContainer");
            container.innerHTML = "";

            publishedBlogs.forEach(blog => {
                container.innerHTML += `
                    <div class="bg-white rounded-2xl overflow-hidden shadow relative">
                        <img src="${blog.image_url}" class="w-full h-60 object-cover">
                        <!-- Save button -->
                        <button onclick="saveBlog('${blog._id}', '${blog.title.replace(/'/g, "\\'")}', '${blog.category.replace(/'/g, "\\'")}', '${blog.image_url.replace(/'/g, "\\'")}')"
                                class="absolute top-3 right-3 bg-white/80 p-2 rounded-full shadow hover:bg-white transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
                            </svg>
                        </button>
                        <div class="p-6">
                            <span class="text-gold text-xs uppercase tracking-widest">${blog.category}</span>
                            <h2 class="font-serif text-2xl mt-3 mb-3 text-dark">${blog.title}</h2>
                            <p class="text-gray-500 mb-4">By ${blog.author}</p>
                            <a href="../blog-details.html?id=${blog._id}" class="text-gold font-semibold">Read More →</a>
                        </div>
                    </div>
                `;
            });

            document.getElementById("loading").style.display = "none";
        } catch (error) {
            console.error(error);
            document.getElementById("loading").innerText = "Failed To Load Blogs";
        }
    }

    // Save a blog as a saved item
    async function saveBlog(id, title, category, image_url) {
        try {
            const res = await fetch(`${API_URL}/saved-designs`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({
                    title: title,
                    category: category,
                    image_url: image_url,
                    type: "blog",
                    original_id: id   // optional
                })
            });

            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || "Save failed");
            alert("Blog saved to your collection!");
        } catch (err) {
            alert(err.message);
        }
    }

    loadBlogs();
</script>
</body>
</html>
