<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Consultations | Livora</title>


<script src="https://cdn.tailwindcss.com"></script>

<script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    gold:"#C59D5F",
                    dark:"#0D0D0D",
                    light:"#F8F6F2"
                }
            }
        }
    }
</script>


</head>

<body class="bg-light">

<div class="flex min-h-screen">

<aside class="w-64 bg-dark text-white flex flex-col">

    <div class="p-6 border-b border-gray-800">

        <h1 class="text-2xl font-bold text-gold">
            LIVORA
        </h1>

    </div>

    <nav class="flex-1 p-4 space-y-2">

        <a
            href="dashboard.html"
            class="block px-4 py-3 rounded hover:bg-gray-800">

            Dashboard

        </a>

        <a
            href="consultations.html"
            class="block px-4 py-3 rounded bg-gold text-dark font-semibold">

            My Consultations

        </a>

        <a
            href="saved-designs.html"
            class="block px-4 py-3 rounded hover:bg-gray-800">

            Saved Designs

        </a>

        <a
            href="blogs.html"
            class="block px-4 py-3 rounded hover:bg-gray-800">

            Blogs

        </a>

        <a
            href="profile.html"
            class="block px-4 py-3 rounded hover:bg-gray-800">

            Profile

        </a>

    </nav>

    <div class="p-4 border-t border-gray-800">

        <button
            id="logoutBtn"
            class="text-red-400 hover:text-red-300">

            Logout

        </button>

    </div>

</aside>

<main class="flex-1">

    <header class="bg-white border-b px-8 py-5">

        <h2 class="text-2xl font-bold">
            My Consultations
        </h2>

    </header>

    <div class="p-8">

        <div class="bg-white rounded-xl shadow overflow-hidden">

            <table class="w-full">

                <thead>

                    <tr class="bg-gray-50">

                        <th class="text-left p-4">
                            Project Type
                        </th>

                        <th class="text-left p-4">
                            Budget
                        </th>

                        <th class="text-left p-4">
                            Preferred Date
                        </th>

                        <th class="text-left p-4">
                            Status
                        </th>

                        <th class="text-left p-4">
                            Message
                        </th>

                    </tr>

                </thead>

                <tbody
                    id="consultationTable">

                </tbody>

            </table>

        </div>

    </div>

</main>

</div>

<script>

if(!localStorage.getItem("token")){

    window.location.href =
    "../auth/login.html";

}

document
.getElementById("logoutBtn")
.addEventListener(
    "click",
    () => {

        localStorage.removeItem(
            "token"
        );

        localStorage.removeItem(
            "role"
        );

        window.location.href =
        "../auth/login.html";

    }
);

const API_URL =
"http://127.0.0.1:8000";

async function loadConsultations(){

    try{

        const response =
        await fetch(
            `${API_URL}/consultations`
        );

        const consultations =
        await response.json();

        const table =
        document.getElementById(
            "consultationTable"
        );

        table.innerHTML = "";

        consultations.forEach(item => {

            table.innerHTML += `

            <tr class="border-t">

                <td class="p-4">

                    ${item.project_type}

                </td>

                <td class="p-4">

                    ${item.budget}

                </td>

                <td class="p-4">

                    ${item.preferred_date}

                </td>

                <td class="p-4">

                    <span class="px-3 py-1 rounded-full bg-yellow-100 text-yellow-700 text-xs">

                        Pending

                    </span>

                </td>

                <td class="p-4">

                    ${item.message.slice(0,50)}...

                </td>

            </tr>

            `;

        });

    }

    catch(error){

        console.error(
            error
        );

    }

}

loadConsultations();

</script>

</body>
</html>
