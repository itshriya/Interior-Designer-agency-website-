<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Projects | Livora</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

        body{
            font-family:'Plus Jakarta Sans',sans-serif;
            background:#0d0d0d;
            color:white;
        }

        .font-serif{
            font-family:'Playfair Display',serif;
        }

        .gold-text{
            color:#c59d5f;
        }

        .project-card{
            overflow:hidden;
            border-radius:20px;
            background:#141414;
            border:1px solid rgba(255,255,255,0.05);
            transition:.4s ease;
        }

        .project-card:hover{
            transform:translateY(-8px);
        }

        .project-card img{
            transition:.5s ease;
        }

        .project-card:hover img{
            transform:scale(1.05);
        }

    </style>

</head>

<body>

    <!-- Navbar -->

    <nav class="w-full py-6 px-6 lg:px-12 border-b border-white/10 flex justify-between items-center">

        <a href="index.html"
           class="flex items-center gap-3">

            <div class="w-10 h-10 rounded-full border border-[#c59d5f] flex items-center justify-center text-[#c59d5f] font-serif">
                L
            </div>

            <span class="uppercase tracking-[0.2em] text-sm">
                Return Home
            </span>

        </a>

    </nav>

    <!-- Hero -->

    <section class="py-24 text-center">

        <div class="max-w-4xl mx-auto px-6">

            <span class="gold-text uppercase tracking-[0.3em] text-xs font-semibold">
                Portfolio
            </span>

            <h1 class="font-serif text-5xl md:text-7xl mt-6 mb-8">
                Our Design Projects
            </h1>

            <p class="text-gray-400 max-w-2xl mx-auto leading-relaxed">
                Discover a curated collection of residential,
                commercial and luxury interior projects crafted
                with timeless elegance and modern functionality.
            </p>

        </div>

    </section>

    <!-- Projects Grid -->

    <section class="pb-24">

        <div class="max-w-7xl mx-auto px-6 lg:px-12">

            <div
                id="projectsContainer"
                class="grid md:grid-cols-2 lg:grid-cols-3 gap-10">

                <!-- Dynamic Projects Will Load Here -->

            </div>

        </div>

    </section>

    <!-- Loading -->

    <div
        id="loading"
        class="text-center text-gray-400 pb-20">

        Loading Projects...

    </div>

  <script>

const API_URL =
"http://127.0.0.1:8000";

async function loadProjects(){

    const container =
    document.getElementById(
        "projectsContainer"
    );

    const loading =
    document.getElementById(
        "loading"
    );

    try{

        const response =
        await fetch(
            `${API_URL}/projects`
        );

        const projects =
        await response.json();

        container.innerHTML = "";

        if(projects.length === 0){

            loading.innerText =
            "No Projects Found";

            return;

        }

        projects.forEach(project => {

            const coverImage =
            project.images &&
            project.images.length > 0
            ? project.images[0]
            : "https://via.placeholder.com/600x400";

            container.innerHTML += `

            <div class="project-card">

                <div class="overflow-hidden">

                    <img
                        src="${coverImage}"
                        alt="${project.title}"
                        class="w-full h-80 object-cover">

                </div>

                <div class="p-6">

                    <span
                        class="gold-text uppercase tracking-[0.3em] text-xs font-semibold">

                        ${project.category}

                    </span>

                    <h3
                        class="font-serif text-3xl mt-4 mb-3">

                        ${project.title}

                    </h3>

                    <p
                        class="text-gray-400 leading-relaxed mb-6">

                        ${project.description}

                    </p>

                    <div
                        class="flex items-center justify-between">

                        <span
                            class="text-sm text-gray-500">

                            📍 ${project.location}

                        </span>

                        <a
                            href="project-details.html?id=${project._id}"
                            class="gold-text text-sm hover:underline">

                            View Project →

                        </a>

                    </div>

                </div>

            </div>

            `;

        });

        loading.style.display =
        "none";

    }

    catch(error){

        console.error(
            error
        );

        loading.innerText =
        "Failed To Load Projects";

    }

}

loadProjects();

</script>


</body>

</html>
