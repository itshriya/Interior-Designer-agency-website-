<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Blog Details | Livora
    </title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>

        body{
            font-family:'Plus Jakarta Sans',sans-serif;
            background:#0d0d0d;
            color:white;
        }

        .font-serif{
            font-family:'Playfair Display',serif;
        }

        .gold-text{
            color:#c59d5f;
        }

    </style>

</head>

<body>

<nav
    class="w-full py-6 px-6 lg:px-12 border-b border-white/10">

    <a
        href="./blog.html"
        class="gold-text uppercase tracking-widest text-sm">

        ← Back To Blogs

    </a>

</nav>

<div
    id="loading"
    class="text-center py-32 text-gray-400">

    Loading Blog...

</div>

<section
    id="blogSection"
    class="hidden">

    <div
        class="max-w-6xl mx-auto px-6 py-16">

        <img
            id="blogImage"
            src=""
            class="w-full h-[500px] object-cover rounded-3xl mb-12">

        <span
            id="blogCategory"
            class="gold-text uppercase tracking-[0.3em] text-xs font-semibold">

        </span>

        <h1
            id="blogTitle"
            class="font-serif text-5xl md:text-7xl mt-6 mb-6">

        </h1>

        <p
            class="text-gray-400 mb-12">

            By
            <span id="blogAuthor"></span>

        </p>

        <div
            id="blogContent"
            class="text-gray-300 leading-loose text-lg whitespace-pre-line">

        </div>

    </div>

</section>

<script>

const API_URL =
"http://127.0.0.1:8000";

const params =
new URLSearchParams(
    window.location.search
);

const blogId =
params.get("id");

async function loadBlog(){

    try{

        const response =
        await fetch(
            `${API_URL}/blog/${blogId}`
        );

        const blog =
        await response.json();

        document
        .getElementById(
            "blogImage"
        )
        .src =
        blog.image_url;

        document
        .getElementById(
            "blogCategory"
        )
        .innerText =
        blog.category;

        document
        .getElementById(
            "blogTitle"
        )
        .innerText =
        blog.title;

        document
        .getElementById(
            "blogAuthor"
        )
        .innerText =
        blog.author;

        document
        .getElementById(
            "blogContent"
        )
        .innerText =
        blog.content;

        document
        .getElementById(
            "loading"
        )
        .style.display =
        "none";

        document
        .getElementById(
            "blogSection"
        )
        .classList.remove(
            "hidden"
        );

    }

    catch(error){

        console.error(error);

        document
        .getElementById(
            "loading"
        )
        .innerText =
        "Failed To Load Blog";

    }

}

loadBlog();

</script>

</body>

</html>
